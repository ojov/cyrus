name: SDK — Python — Publish

on:
  push:
    tags:
      - "sdk-python-v*"

jobs:
  # NOTE: this guard's own logic lives in this same file, and GitHub resolves an on:push (tag)
  # workflow from the YAML at the pushed commit itself — so a tagged commit could in principle
  # ship a modified copy of this job with the check removed. Accepted for now: only the repo
  # owner can push tags here. Revisit (e.g. a tag-protection ruleset restricting who can create
  # sdk-python-v* tags) if that access model ever changes.
  #
  # Checked against dev, not main: main is reserved for urgent/admin-only production changes to
  # the Java backend (it's what deploy.yml deploys from) — normal work, including SDK releases,
  # goes through dev first. A release tag is expected to be created from dev, then merged to main
  # later as a separate, decoupled step that doesn't gate the release.
  verify-tag-on-dev:
    name: Verify tag is reachable from dev
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check tag is on dev
        env:
          TAG_SHA: ${{ github.sha }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          git fetch origin dev
          if ! git merge-base --is-ancestor "$TAG_SHA" origin/dev; then
            echo "::error::Tag $TAG_NAME (commit $TAG_SHA) is not reachable from dev. Merge to dev before tagging a release."
            exit 1
          fi
          echo "OK: $TAG_NAME is on dev."

  publish:
    name: Build and publish to PyPI
    needs: verify-tag-on-dev
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    defaults:
      run:
        working-directory: sdk/python
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests
        run: uv run pytest -v

      - name: Build
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/python/dist
          skip-existing: true
