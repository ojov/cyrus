name: CD - Deploy to Cloud Run

on:
  push:
    branches:
      - main
    paths:
    - src/**
    - pom.xml
    - Dockerfile
    - mvnw
    - .mvn/**
    - application*.yml
    - .github/workflows/**
  workflow_dispatch:
env:
  GCP_REGION: us-central1
  GCP_PROJECT_ID: nombacyrus

  GAR_REPOSITORY: cyrus
  SERVICE_NAME: cyrus-api

  IMAGE_NAME: cyrus-api
jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: corretto
          cache: maven
      - name: Build and run tests
        run: |
          mvn clean verify --batch-mode
  deploy:
    name: Docker Build, Push & Deploy
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      id-token: write
    steps:

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate version info
        id: version
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
          VERSION=${VERSION#v}
          SHA=$(git rev-parse HEAD)

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "sha=$SHA" >> $GITHUB_OUTPUT
      #
      # Authenticate GitHub -> GCP
      #
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: github-deployer@nombacyrus.iam.gserviceaccount.com

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: |
          gcloud auth configure-docker \
          us-central1-docker.pkg.dev

      - name: Build image

        run: |

          IMAGE="us-central1-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/${IMAGE_NAME}"

          docker build \
          -t $IMAGE:${{ steps.version.outputs.sha }} \
          -t $IMAGE:latest \
          .
      - name: Push image
        run: |

          IMAGE="us-central1-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/${IMAGE_NAME}"

          docker push $IMAGE:${{ steps.version.outputs.sha }}

          docker push $IMAGE:latest
      - name: Deploy Cloud Run
        run: |
          IMAGE="us-central1-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/${IMAGE_NAME}"

          gcloud run deploy $SERVICE_NAME \
            --image $IMAGE:${{ steps.version.outputs.sha }} \
            --region $GCP_REGION \
            --platform managed \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3 \
            --timeout 60
