name: CI

on:
  pull_request:
    branches:
      - dev
      - main
    paths-ignore:
      - "sdk/**"
  push:
    branches:
      - dev
    paths-ignore:
      - "sdk/**"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: "25"
          cache: maven

      - name: Build & test
        run: ./mvnw clean verify --batch-mode
