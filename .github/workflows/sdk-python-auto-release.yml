name: SDK — Python — Auto Release

# Fires on every push to dev that touches sdk/python/**. If __version__ changed as part of that
# push, tags the commit that just landed (sdk-python-v<version>) and publishes it — no manual
# `git tag` step, and no way to tag a commit that isn't already on dev, since this only ever runs
# in response to a push that already happened.
#
# The tag this job pushes uses the default GITHUB_TOKEN, which — by GitHub's own documented
# recursion-prevention rule — will NOT re-trigger sdk-python-publish.yml's tag-push trigger. That's
# why the actual build/publish happens inline here (via the shared reusable workflow) rather than
# relying on the tag push to kick off a second workflow run. sdk-python-publish.yml's tag trigger
# remains as a manual escape hatch for re-releasing a specific commit by hand if ever needed.
on:
  push:
    branches:
      - dev
    paths:
      - "sdk/python/**"

jobs:
  check-version-and-tag:
    name: Tag a new version if bumped
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      released: ${{ steps.check.outputs.released }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check version and tag if it changed
        id: check
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          NEW_VERSION=$(grep -m1 '^__version__' sdk/python/src/cyrus/__init__.py | sed -E 's/__version__ = "(.*)"/\1/')

          OLD_VERSION=""
          if git cat-file -e "$BEFORE_SHA" 2>/dev/null; then
            OLD_VERSION=$(git show "$BEFORE_SHA:sdk/python/src/cyrus/__init__.py" 2>/dev/null | grep -m1 '^__version__' | sed -E 's/__version__ = "(.*)"/\1/' || true)
          fi

          echo "Previous version: ${OLD_VERSION:-<none>} — current version: $NEW_VERSION"

          if [ "$NEW_VERSION" = "$OLD_VERSION" ]; then
            echo "Version unchanged — nothing to release."
            echo "released=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TAG="sdk-python-v$NEW_VERSION"

          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists on origin — was the version bump not applied, or already released?"
            echo "released=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          git tag "$TAG"
          git push origin "$TAG"
          echo "released=true" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Tagged and pushed $TAG"

  publish:
    name: Build and publish to PyPI
    needs: check-version-and-tag
    if: needs.check-version-and-tag.outputs.released == 'true'
    uses: ./.github/workflows/sdk-python-build-publish.yml
