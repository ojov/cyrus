name: SDK — Python — Build & Publish (reusable)

# Shared by both release paths: the tag-triggered manual escape hatch (sdk-python-publish.yml)
# and the auto-release-on-dev-push path (sdk-python-auto-release.yml). Not meant to run on its
# own — it only has a `workflow_call` trigger, so it never appears as a standalone run.
on:
  workflow_call:

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    defaults:
      run:
        working-directory: sdk/python
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests
        run: uv run pytest -v

      - name: Build
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/python/dist
          skip-existing: true
