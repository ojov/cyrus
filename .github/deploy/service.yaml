# Declarative Cloud Run service spec — the single source of truth for cyrus-api's runtime config.
# Applied by CI with:  sed "s|IMAGE_PLACEHOLDER|<image>|g" service.yaml | gcloud run services replace - --region us-central1
# Secrets are Secret Manager references (values never live here or in logs). Non-secret config is plain env.
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: cyrus-api
  labels:
    cloud.googleapis.com/location: us-central1
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: '0'
        autoscaling.knative.dev/maxScale: '3'
        run.googleapis.com/startup-cpu-boost: 'true'
    spec:
      serviceAccountName: cyrus-api-runtime@nombacyrus.iam.gserviceaccount.com
      containerConcurrency: 80
      timeoutSeconds: 60
      containers:
        - image: IMAGE_PLACEHOLDER
          ports:
            - name: http1
              containerPort: 8080
          resources:
            limits:
              cpu: '1'
              memory: 512Mi
          startupProbe:
            tcpSocket:
              port: 8080
            periodSeconds: 240
            failureThreshold: 1
            timeoutSeconds: 240
          env:
            # --- Non-secret config ---
            - name: APP_ENV
              value: prod
            - name: APP_BASE_URL
              value: https://api.trycyrus.app
            - name: APP_FRONTEND_URL
              value: https://trycyrus.app
            - name: CORS_ALLOWED_ORIGINS
              value: https://trycyrus.app,http://localhost:3000
            # Reconciliation engine: delay (seconds) between webhook and first requery, and max-attempts before MANUAL_REVIEW
            - name: APP_RECONCILIATION_DELAY_SECONDS
              value: '300'
            - name: APP_RECONCILIATION_MAX_ATTEMPTS
              value: '5'
            # Outbound merchant webhooks: delivery attempts and exponential backoff bounds (seconds)
            - name: APP_WEBHOOK_MAX_ATTEMPTS
              value: '5'
            - name: APP_WEBHOOK_INITIAL_BACKOFF_SECONDS
              value: '60'
            - name: APP_WEBHOOK_MAX_BACKOFF_SECONDS
              value: '3600'
            # --- Secrets (Secret Manager references) ---
            - name: DB_URL
              valueFrom:
                secretKeyRef: { name: DB_URL, key: latest }
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef: { name: DB_USERNAME, key: latest }
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef: { name: DB_PASSWORD, key: latest }
            - name: APP_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef: { name: APP_ENCRYPTION_KEY, key: latest }
            - name: RSA_PRIVATE_KEY
              valueFrom:
                secretKeyRef: { name: RSA_PRIVATE_KEY, key: latest }
            - name: RSA_PUBLIC_KEY
              valueFrom:
                secretKeyRef: { name: RSA_PUBLIC_KEY, key: latest }
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef: { name: RESEND_API_KEY, key: latest }
            - name: NOMBA_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef: { name: NOMBA_WEBHOOK_SECRET, key: latest }
            # Cyrus's own platform Nomba account. accountId is shared across TEST/LIVE; only the
            # client id/secret differ per environment. Create these secrets in Secret Manager.
            - name: NOMBA_ACCOUNT_ID
              valueFrom:
                secretKeyRef: { name: NOMBA_ACCOUNT_ID, key: latest }
            # Optional: uncomment if VAs are provisioned under a sub-account (create the secret first).
            # - name: NOMBA_SUB_ACCOUNT_ID
            #   valueFrom:
            #     secretKeyRef: { name: NOMBA_SUB_ACCOUNT_ID, key: latest }
            - name: NOMBA_SANDBOX_CLIENT_ID
              valueFrom:
                secretKeyRef: { name: NOMBA_SANDBOX_CLIENT_ID, key: latest }
            - name: NOMBA_SANDBOX_CLIENT_SECRET
              valueFrom:
                secretKeyRef: { name: NOMBA_SANDBOX_CLIENT_SECRET, key: latest }
            # LIVE credentials — uncomment once the Secret Manager secrets exist (app boots without them).
            # - name: NOMBA_LIVE_CLIENT_ID
            #   valueFrom:
            #     secretKeyRef: { name: NOMBA_LIVE_CLIENT_ID, key: latest }
            # - name: NOMBA_LIVE_CLIENT_SECRET
            #   valueFrom:
            #     secretKeyRef: { name: NOMBA_LIVE_CLIENT_SECRET, key: latest }
  traffic:
    - latestRevision: true
      percent: 100
