server:
  port: ${SERVER_PORT:8080}
spring:
  profiles:
    active: ${APP_ENV:dev}
  application:
    name: cyrus
  # Database & JPA
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      # Flyway owns schema changes now — validate only checks entities still match the DB, it
      # never alters it. Any entity/schema drift fails fast at startup instead of at the first
      # query that hits it.
      ddl-auto: validate
    show-sql: true
    open-in-view: false
  flyway:
    enabled: true
    # The schema already existed (from ddl-auto=update) before Flyway was introduced. baseline-on-migrate
    # records V1 as already-applied on a non-empty schema without re-running its DDL (which would fail —
    # the tables are already there); a genuinely fresh/empty DB just runs V1 normally, creating them.
    baseline-on-migrate: true
    baseline-version: 1
  threads:
    virtual:
      enabled: true
  jackson:
    # This app is on Spring Boot 4 / Jackson 3 (tools.jackson, not com.fasterxml.jackson) —
    # JacksonProperties has no "generator"/"parser" groups any more; the equivalent of Jackson 2's
    # spring.jackson.generator.* is spring.jackson.write.* (binds tools.jackson.core.StreamWriteFeature).
    write:
      # Money is BigDecimal kobo — always emit plain decimal notation,gv gt5 never scientific, so API
      # consumers parsing JSON numbers are never surprised at extreme magnitudes. Verified this
      # actually changes output (Jackson 2's WRITE_BIGDECIMAL_AS_PLAIN moved from JsonGenerator.Feature
      # to plain StreamWriteFeature in Jackson 3, not the JSON-specific JsonWriteFeature).
      write-bigdecimal-as-plain: true

springdoc:
  packages-to-scan: com.ojo.cyrus.controllers.developer
  api-docs:
    path: /v3/api-docs

scalar:
  enabled: true
  url: /v3/api-docs
  path: /docs
  page-title: Cyrus Developer API
  theme: deep_space
  layout: modern
  # Palette matches web/app/globals.css exactly (converted from its oklch tokens) so the Scalar
  # docs UI and the dashboard/landing page read as the same product.
  custom-css: |-
    :root {
      --scalar-color-accent: #5c29c2;
      --scalar-background-accent: #5c29c212;
      --scalar-border-color: #dddceb;
    }

    .light-mode {
      --scalar-color-1: #06081a;
      --scalar-color-2: #5a5966;
      --scalar-color-3: #8b8998;
      --scalar-background-1: #ffffff;
      --scalar-background-2: #f4f3ff;
      --scalar-background-3: #e7e5fb;
      --scalar-border-color: #dddceb;
    }

    .dark-mode {
      --scalar-color-1: #ebeaf3;
      --scalar-color-2: #a3a2b7;
      --scalar-color-3: #7d7c8f;
      --scalar-color-accent: #a692fb;
      --scalar-background-1: #13131f;
      --scalar-background-2: #0a0a14;
      --scalar-background-3: #27263a;
      --scalar-background-accent: #a692fb0f;
      --scalar-border-color: #2a293a;
    }

    .sidebar {
      --scalar-sidebar-item-active-background: var(--scalar-background-accent);
      --scalar-sidebar-item-active-border-left: 3px solid var(--scalar-color-accent);
    }

    .dark-mode .sidebar {
      --scalar-sidebar-item-active-border-left: 3px solid var(--scalar-color-accent);
    }

  hide-dark-mode-toggle: false
  hide-models: true
  hide-search: false
  hide-test-request-button: false
  dark-mode: true
# Cyrus's single platform Nomba account. accountId + subAccountId are SHARED across TEST/LIVE;
# only clientId/clientSecret differ per environment. Sandbox creds are required to boot; LIVE creds
# are optional (leave the LIVE env vars unset until you go live).
nomba:
  base-url: https://api.nomba.com
  timeout-ms: 30000
  webhook-secret: ${NOMBA_WEBHOOK_SECRET}
  account-id: ${NOMBA_ACCOUNT_ID}
  sub-account-id: ${NOMBA_SUB_ACCOUNT_ID}
  client-id: ${NOMBA_LIVE_CLIENT_ID:}
  client-secret: ${NOMBA_LIVE_CLIENT_SECRET:}
app:
  base-url: ${APP_BASE_URL:http://localhost:${SERVER_PORT:8080}}
  # Where the Next.js app lives — used to build links (e.g. password reset) that must open in the
  # frontend, not the backend. Prod: set APP_FRONTEND_URL=https://trycyrus.app.
  frontend-url: ${APP_FRONTEND_URL:http://localhost:3000}
  encryption-key: ${APP_ENCRYPTION_KEY}
  # Comma-separated emails promoted to SUPER_ADMIN at startup (bootstrap platform admins). Empty by
  # default — set APP_SUPER_ADMIN_EMAILS to grant the first admin(s).
  super-admin-emails: ${APP_SUPER_ADMIN_EMAILS}
  jwt:

    issuer: cyrus
    refresh-expiry-days: 30
  # The dashboard JWT is delivered as an httpOnly cookie, never in a JSON response body — the
  # frontend never touches the raw token. `secure: false` here is for local dev over plain
  # http://localhost only; application-prod.yml overrides this to true (HTTPS-only cookie).
  auth-cookie:
    secure: false
  reconciliation:
    # Reconciliation runs immediately (async) right after a transaction is ingested — this delay
    # only governs the periodic sweep that catches anything still unconfirmed (interval, and the
    # minimum age before a sweep retry). Override via APP_RECONCILIATION_DELAY_SECONDS.
    delay-seconds: ${APP_RECONCILIATION_DELAY_SECONDS:300}
    # How many requery attempts (immediate + sweep retries) before we give up and flag MANUAL_REVIEW.
    max-attempts: ${APP_RECONCILIATION_MAX_ATTEMPTS:5}
  fees:
    # Inbound payments: merchant pays inflow-percent of the gross (min inflow-min-kobo,
    # max inflow-max-kobo). Nomba's own fee (1% min ₦10 max ₦150) is tracked separately
    # from the webhook; Cyrus's margin = merchant fee − Nomba fee.
    inflow-percent: ${APP_INFLOW_FEE_PERCENT:1.5}
    inflow-min-kobo: ${APP_INFLOW_FEE_MIN_KOBO:1500}
    inflow-max-kobo: ${APP_INFLOW_FEE_MAX_KOBO:22500}
    # Payouts: flat fee per transfer (₦30 — ₦20 covers Nomba's fixed charge, ₦10 is Cyrus's margin).
    payout-flat-fee-kobo: ${APP_PAYOUT_FEE_KOBO:3000}
  webhook:
    # Outbound merchant webhook delivery: how many attempts before a delivery is marked FAILED,
    # and the exponential backoff bounds between retries (min(initial * 2^(n-1), max)).
    max-attempts: ${APP_WEBHOOK_MAX_ATTEMPTS:5}
    initial-backoff-seconds: ${APP_WEBHOOK_INITIAL_BACKOFF_SECONDS:60}
    max-backoff-seconds: ${APP_WEBHOOK_MAX_BACKOFF_SECONDS:3600}
  payout-requery:
    # How often the payout requery sweep runs (processing payouts with a provider reference are
    # polled against Nomba's transfer requery endpoint to catch missed webhooks).
    delay-seconds: ${APP_PAYOUT_REQUERY_DELAY_SECONDS:120}
  missing-webhook-sweep:
    # How often MissingWebhookSweepService diffs Nomba's sub-account transaction list against local
    # records to catch a payment whose webhook was never delivered at all. This is a BACKSTOP for a
    # rare event (webhooks are the primary path and deliver near-instantly with their own retries),
    # so it runs infrequently — 6h, tuned for current low volume. The lookback window (not this
    # interval) is what guarantees no gap is missed; the interval only governs how quickly a lost
    # payment is noticed (worst case ~6h). Lower it as traction grows and faster recovery matters.
    delay-seconds: ${APP_MISSING_WEBHOOK_SWEEP_DELAY_SECONDS:21600}
    # Trailing window pulled each run, deliberately overlapping the previous run.
    lookback-hours: ${APP_MISSING_WEBHOOK_SWEEP_LOOKBACK_HOURS:48}
    # true = log detected gaps (with the raw Nomba item) but write nothing. Flip to false only after
    # verifying the logged field mapping against a real Nomba response.
    dry-run: ${APP_MISSING_WEBHOOK_SWEEP_DRY_RUN:true}
    # true = also log the first item scanned each run in full, regardless of match status — lets you
    # see the real response schema even on a run with zero gaps. Turn off once verified.
    log-sample-item: ${APP_MISSING_WEBHOOK_SWEEP_LOG_SAMPLE_ITEM:true}
  cors:
    # Comma-separated origins (Spring binds a comma-separated value to the list). No trailing
    # slashes — each must match the browser Origin header exactly. Override via CORS_ALLOWED_ORIGINS
    # (e.g. to add Vercel preview URLs).
    allowed-origins:
      - http://localhost:3000
      - https://trycyrus.app
      - https://api.trycyrus.app
    allowed-methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    allowed-headers:
      - Authorization
      - Content-Type
      - Accept
management:
  endpoints:
    web:
      exposure:
        include: health
rsa:
  public-key: ${RSA_PUBLIC_KEY}
  private-key: ${RSA_PRIVATE_KEY}

resend:
  api-key: ${RESEND_API_KEY}
jobrunr:
  background-job-server:
    enabled: true
  dashboard:
    enabled: true