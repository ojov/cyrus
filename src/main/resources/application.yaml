server:
  port: ${SERVER_PORT:8080}
spring:
  profiles:
    active: ${APP_ENV}
  application:
    name: cyrus

  # Database & JPA
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    open-in-view: false
  flyway:
    enabled: false
springdoc:
  swagger-ui:
    path: /docs
nomba:
  sandbox-url: https://sandbox.nomba.com
  production-url: https://api.nomba.com
  timeout-ms: 30000
  webhook-secret: ${NOMBA_WEBHOOK_SECRET}

app:
  base-url: ${APP_BASE_URL:http://localhost:${SERVER_PORT:8080}}
  encryption-key: ${APP_ENCRYPTION_KEY}
  jwt:
    issuer: cyrus
    expiry-hours: 8
  cors:
    allowed-origins:
      - ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
    allowed-methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    allowed-headers:
      - Authorization
      - Content-Type
      - Accept
management:
  endpoints:
    web:
      exposure:
        include: health
rsa:
  public-key: ${RSA_PUBLIC_KEY}
  private-key: ${RSA_PRIVATE_KEY}

resend:
  api-key: ${RESEND_API_KEY}
  from-email: onboarding@resend.dev