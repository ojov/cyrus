server:
  port: ${SERVER_PORT:8080}
spring:
  profiles:
    active: ${APP_ENV:dev}
  application:
    name: cyrus

  # Database & JPA
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5438/cyrus}
    username: ${DB_USERNAME:cyrus}
    password: ${DB_PASSWORD:cyrus_password}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
  flyway:
    enabled: false
springdoc:
  swagger-ui:
    path: /docs
nomba:
  sandbox-url: https://sandbox.nomba.com
  production-url: https://api.nomba.com
  timeout-ms: 30000

app:
  base-url: ${APP_BASE_URL:http://localhost:${SERVER_PORT:8080}}
  encryption-key: ${APP_ENCRYPTION_KEY}
  cors:
    allowed-origins:
      - ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
    allowed-methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    allowed-headers:
      - Authorization
      - Content-Type
      - Accept
management:
  endpoints:
    web:
      exposure:
        include: health
rsa:
  public-key: ${RSA_PUBLIC_KEY}
  private-key: ${RSA_PRIVATE_KEY}

resend:
  api-key: ${RESEND_API_KEY}
  from-email: onboarding@resend.dev