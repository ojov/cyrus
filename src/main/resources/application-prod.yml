logging:
  level:
    root: info
spring:
  jpa:
    show-sql: false
server:
  forward-headers-strategy: framework
resend:
  from-email: ${FROM_EMAIL}
app:
  # HTTPS-only cookie in production — the dashboard is always served over https in prod, so this
  # is safe (never relax to false outside local dev).
  auth-cookie:
    secure: true
# Public API docs (Scalar/OpenAPI) show only the developer-facing customer API in production —
# dashboard/ops endpoints and the Nomba webhook receiver are internal, not part of the published
# developer surface. Dev/local (application.yaml) keeps the full package for local exploration.
springdoc:
  packages-to-scan: com.ojo.cyrus.controllers.developer