<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification Failed — Cyrus</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f3ff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            padding: 48px 40px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 0 4px 24px rgba(107, 70, 193, 0.1);
        }
        .icon {
            width: 64px;
            height: 64px;
            background: #e53e3e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }
        h1 { color: #1a1a2e; font-size: 24px; margin-bottom: 12px; }
        p { color: #555; line-height: 1.6; margin-bottom: 16px; }
        .error-detail { color: #e53e3e; font-size: 14px; margin-bottom: 24px; }
        .brand { color: #6b46c1; font-weight: 700; font-size: 18px; margin-bottom: 32px; display: block; }
    </style>
</head>
<body>
    <div class="card">
        <span class="brand">Cyrus</span>
        <div class="icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
            </svg>
        </div>
        <h1>Verification failed</h1>
        <p>We could not verify your email address.</p>
        <p class="error-detail" th:text="${errorMessage}">The verification link is invalid or has expired.</p>
        <p>Please register again or contact support if the problem persists.</p>
    </div>
</body>
</html>
